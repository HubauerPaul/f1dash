<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>F1 Dashboard — Lower</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #222;
    --text: #e0e0e0;
    --dim: #666;
    --f1-red: #ff1801;
    --green: #00d647;
    --yellow: #ffd000;
    --double-yellow: #ff8c00;
    --red: #ff1801;
    --blue: #2196f3;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    position: relative;
  }

  /* ── Main Layout ─────────────────────────── */
  .main {
    display: flex;
    height: 100%;
  }

  /* ── Race Control Panel (left, ~68%) ─────── */
  .rc-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
  }

  .rc-header {
    height: 52px;
    min-height: 52px;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
  }

  .rc-title {
    font-size: 20px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--f1-red);
  }

  .rc-count {
    font-size: 13px;
    color: var(--dim);
    margin-left: auto;
  }

  .rc-messages {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
    padding: 8px 0;
  }

  /* ── Race Control Message Row ────────────── */
  .rc-msg {
    display: grid;
    grid-template-columns: 90px auto 1fr;
    gap: 0;
    padding: 10px 24px;
    border-bottom: 1px solid #1a1a1a;
    font-size: 17px;
    line-height: 1.4;
    align-items: start;
    transition: background 0.2s;
  }
  .rc-msg:first-child {
    animation: fadeIn 0.4s ease;
  }
  .rc-msg:hover {
    background: #1a1a1a;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .rc-time {
    font-size: 14px;
    font-weight: 500;
    color: var(--dim);
    padding-top: 2px;
  }

  .rc-driver-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 700;
    margin-right: 10px;
    min-width: 80px;
    justify-content: center;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .rc-driver-tag .tag-stripe {
    width: 3px;
    height: 16px;
    border-radius: 1px;
    margin-right: 3px;
  }

  .rc-text {
    font-size: 17px;
    font-weight: 400;
    word-break: break-word;
  }

  /* Message type indicators */
  .rc-msg.flag .rc-text { font-weight: 600; }
  .rc-msg.flag-yellow .rc-text { color: var(--yellow); }
  .rc-msg.flag-red .rc-text { color: var(--red); font-weight: 700; }
  .rc-msg.flag-green .rc-text { color: var(--green); }
  .rc-msg.investigation .rc-text { color: #ff9800; }
  .rc-msg.penalty .rc-text { color: var(--red); }
  .rc-msg.drs .rc-text { color: var(--green); }
  .rc-msg.track_limits .rc-text { color: var(--yellow); }

  .rc-type-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 8px;
    vertical-align: middle;
  }
  .rc-type-badge.flag { background: rgba(255,208,0,0.2); color: var(--yellow); }
  .rc-type-badge.investigation { background: rgba(255,152,0,0.2); color: #ff9800; }
  .rc-type-badge.penalty { background: rgba(255,24,1,0.2); color: var(--red); }
  .rc-type-badge.drs { background: rgba(0,214,71,0.2); color: var(--green); }
  .rc-type-badge.track_limits { background: rgba(255,208,0,0.15); color: var(--yellow); }
  .rc-type-badge.other { background: rgba(100,100,100,0.2); color: var(--dim); }

  /* ── Right Sidebar ───────────────────────── */
  .sidebar {
    width: 600px;
    min-width: 600px;
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }

  /* ── Tire Strategy Section ───────────────── */
  .tire-section {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--f1-red);
    margin-bottom: 12px;
  }

  .tire-grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 340px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }

  .tire-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
  }

  .tire-row-pos {
    width: 24px;
    font-size: 12px;
    font-weight: 600;
    text-align: right;
    color: var(--dim);
  }

  .tire-row-stripe {
    width: 3px;
    height: 18px;
    border-radius: 1px;
  }

  .tire-row-name {
    width: 40px;
    font-size: 12px;
    font-weight: 700;
  }

  .tire-stint {
    display: flex;
    align-items: center;
    gap: 1px;
  }

  .stint-chip {
    display: flex;
    align-items: center;
    padding: 1px 5px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    gap: 3px;
    border: 2px solid;
  }
  .stint-chip.S { border-color: var(--f1-red); color: var(--f1-red); }
  .stint-chip.M { border-color: var(--yellow); color: var(--yellow); }
  .stint-chip.H { border-color: #ccc; color: #ccc; }
  .stint-chip.I { border-color: var(--green); color: var(--green); }
  .stint-chip.W { border-color: var(--blue); color: var(--blue); }

  .stint-laps {
    font-weight: 600;
  }

  /* ── Weather Section ─────────────────────── */
  .weather-section {
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
  }

  .weather-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .weather-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .weather-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .weather-value {
    font-size: 28px;
    font-weight: 700;
  }

  .weather-value.temp { color: #ff8c00; }
  .weather-value.track { color: #ff5722; }
  .weather-value.humidity { color: var(--blue); }
  .weather-value.wind { color: #78909c; }
  .weather-value.rain { color: var(--blue); }
  .weather-value.pressure { color: #888; }

  .weather-unit {
    font-size: 16px;
    font-weight: 400;
    color: var(--dim);
  }

  /* ── Countdown Section ───────────────────── */
  .countdown-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 24px;
  }

  .countdown-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
  }

  .countdown-time {
    font-size: 52px;
    font-weight: 300;
    letter-spacing: 2px;
    color: var(--text);
  }

  .countdown-sub {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--dim);
  }

  .countdown-limit {
    padding: 3px 10px;
    border-radius: 4px;
    background: var(--surface2);
    font-size: 12px;
  }
  .countdown-limit.active {
    color: var(--yellow);
    background: rgba(255,208,0,0.1);
  }
  .countdown-limit.exceeded {
    color: var(--red);
    background: rgba(255,24,1,0.1);
  }

  /* ── Standby ─────────────────────────────── */
  .standby {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 500;
    background: var(--bg);
  }
  .standby.hidden { display: none; }
  .standby h1 { font-size: 28px; font-weight: 300; }
  .standby h1 span { color: var(--f1-red); font-weight: 900; }
  .standby .sub { color: var(--dim); font-size: 14px; margin-top: 8px; }
</style>
</head>
<body>

<div class="standby" id="standby">
  <h1>F1 <span>LIVE</span> DASHBOARD</h1>
  <div class="sub">Lower Monitor — Waiting for session…</div>
</div>

<div class="main">
  <!-- Race Control (left) -->
  <div class="rc-panel">
    <div class="rc-header">
      <span class="rc-title">Race Control</span>
      <span class="rc-count" id="rcCount"></span>
    </div>
    <div class="rc-messages" id="rcMessages">
      <div style="padding:40px;text-align:center;color:var(--dim)">Waiting for race control messages…</div>
    </div>
  </div>

  <!-- Right Sidebar -->
  <div class="sidebar">
    <!-- Tire Strategy -->
    <div class="tire-section">
      <div class="section-title">Tyre Strategy</div>
      <div class="tire-grid" id="tireGrid"></div>
    </div>

    <!-- Weather -->
    <div class="weather-section">
      <div class="section-title">Weather</div>
      <div class="weather-grid" id="weatherGrid">
        <div class="weather-item">
          <span class="weather-label">Air Temp</span>
          <span class="weather-value temp" id="wAir">—</span>
        </div>
        <div class="weather-item">
          <span class="weather-label">Track Temp</span>
          <span class="weather-value track" id="wTrack">—</span>
        </div>
        <div class="weather-item">
          <span class="weather-label">Humidity</span>
          <span class="weather-value humidity" id="wHumid">—</span>
        </div>
        <div class="weather-item">
          <span class="weather-label">Wind</span>
          <span class="weather-value wind" id="wWind">—</span>
        </div>
        <div class="weather-item">
          <span class="weather-label">Rain Risk</span>
          <span class="weather-value rain" id="wRain">—</span>
        </div>
        <div class="weather-item">
          <span class="weather-label">Pressure</span>
          <span class="weather-value pressure" id="wPressure">—</span>
        </div>
      </div>
    </div>

    <!-- Countdown Timer -->
    <div class="countdown-section">
      <div class="countdown-title" id="countdownTitle">Session Time</div>
      <div class="countdown-time" id="countdownTime">0:00:00</div>
      <div class="countdown-sub">
        <span class="countdown-limit" id="limit2h">2h Limit: —</span>
        <span class="countdown-limit" id="limit3h">3h Limit: —</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────
let state = null;
let ws = null;
let reconnectTimer = null;
let sessionStartTime = null;
let countdownInterval = null;

// Driver lookup for team colors
let driverMap = {};  // driver_number -> {abbr, team_color, team}

// ── WebSocket ─────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/lower`);

  ws.onopen = () => {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onclose = () => {
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'keepalive' || d.type === 'pong') return;
      if (d.type === 'refresh') { location.reload(); return; }
      state = d;
      render();
    } catch (err) { console.error('Parse error:', err); }
  };

  setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping');
  }, 20000);
}

// ── Rendering ─────────────────────────────────
function render() {
  if (!state) return;

  const s = state.session || {};
  const isActive = s.status === 'active';

  // Standby
  const standby = document.getElementById('standby');
  if (!isActive && (!state.race_control || state.race_control.length === 0)) {
    standby.classList.remove('hidden');
    return;
  }
  standby.classList.add('hidden');

  // Build driver map for team color lookup
  if (state.drivers) {
    for (const d of state.drivers) {
      driverMap[d.driver_number] = {
        abbr: d.abbr,
        team_color: d.team_color || '#555',
        team: d.team || '',
      };
    }
  }

  // Race Control
  renderRaceControl(state.race_control || []);

  // Tire Strategy
  renderTireStrategy(state.drivers || []);

  // Weather
  renderWeather(state.weather || {});

  // Countdown
  updateCountdown(state);
}

function renderRaceControl(messages) {
  const container = document.getElementById('rcMessages');
  document.getElementById('rcCount').textContent = `${messages.length} messages`;

  if (messages.length === 0) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--dim)">No race control messages yet</div>';
    return;
  }

  let html = '';
  for (const msg of messages) {
    // Determine CSS classes based on type
    let typeClass = (msg.type || 'OTHER').toLowerCase();
    let flagClass = '';

    if (msg.type === 'FLAG') {
      typeClass = 'flag';
      const f = (msg.flag || '').toLowerCase();
      if (f === 'yellow' || f === 'double_yellow') flagClass = 'flag-yellow';
      else if (f === 'red') flagClass = 'flag-red';
      else if (f === 'green') flagClass = 'flag-green';
    }

    // Try to find driver info and team color
    let driverTag = '';
    if (msg.driver) {
      // Extract driver number from "Car XX (ABR)" format
      const numMatch = msg.driver.match(/Car (\d+)/);
      const abbrMatch = msg.driver.match(/\(([A-Z]+)\)/);
      const num = numMatch ? numMatch[1] : '';
      const abbr = abbrMatch ? abbrMatch[1] : '';
      const drv = driverMap[parseInt(num)] || {};
      const color = drv.team_color || '#555';

      driverTag = `<span class="rc-driver-tag" style="background:${hexToRgba(color, 0.2)};color:${color};border:1px solid ${hexToRgba(color, 0.4)}">
        <span class="tag-stripe" style="background:${color}"></span>
        ${abbr || 'Car ' + num}
      </span>`;
    } else if (msg.driver_number) {
      const drv = driverMap[parseInt(msg.driver_number)] || {};
      const color = drv.team_color || '#555';
      const abbr = drv.abbr || msg.driver_number;
      driverTag = `<span class="rc-driver-tag" style="background:${hexToRgba(color, 0.2)};color:${color};border:1px solid ${hexToRgba(color, 0.4)}">
        <span class="tag-stripe" style="background:${color}"></span>
        ${abbr}
      </span>`;
    }

    // Type badge
    const typeBadge = `<span class="rc-type-badge ${typeClass}">${formatType(msg.type)}</span>`;

    html += `
      <div class="rc-msg ${typeClass} ${flagClass}">
        <span class="rc-time">${msg.timestamp || ''}</span>
        <span>${driverTag}</span>
        <span class="rc-text">${typeBadge}${escapeHtml(msg.message || '')}</span>
      </div>`;
  }

  container.innerHTML = html;
}

function renderTireStrategy(drivers) {
  const grid = document.getElementById('tireGrid');
  if (!drivers.length) return;

  let html = '';
  for (const d of drivers) {
    const stints = d.stints || [];
    if (stints.length === 0) continue;

    let stintChips = '';
    for (const stint of stints) {
      stintChips += `<span class="stint-chip ${stint.compound}">
        <span>${stint.compound}</span>
        <span class="stint-laps">${stint.laps || ''}</span>
      </span> `;
    }

    html += `
      <div class="tire-row">
        <span class="tire-row-pos">${d.pos || ''}</span>
        <span class="tire-row-stripe" style="background:${d.team_color || '#555'}"></span>
        <span class="tire-row-name">${d.abbr || '???'}</span>
        <div class="tire-stint">${stintChips}</div>
      </div>`;
  }

  grid.innerHTML = html;
}

function renderWeather(w) {
  document.getElementById('wAir').innerHTML = w.air_temp ?
    `${w.air_temp.toFixed(1)}<span class="weather-unit">°C</span>` : '—';
  document.getElementById('wTrack').innerHTML = w.track_temp ?
    `${w.track_temp.toFixed(1)}<span class="weather-unit">°C</span>` : '—';
  document.getElementById('wHumid').innerHTML = w.humidity ?
    `${Math.round(w.humidity)}<span class="weather-unit">%</span>` : '—';
  document.getElementById('wWind').innerHTML = w.wind_speed ?
    `${w.wind_speed.toFixed(1)}<span class="weather-unit"> km/h ${windDirArrow(w.wind_direction)}</span>` : '—';
  document.getElementById('wRain').innerHTML =
    `${Math.round(w.rain_probability || 0)}<span class="weather-unit">%</span>`;
  document.getElementById('wPressure').innerHTML = w.pressure ?
    `${w.pressure.toFixed(0)}<span class="weather-unit"> hPa</span>` : '—';
}

function updateCountdown(state) {
  // Parse session start time
  const startStr = state.race_start_time || state.session?.date_start || '';
  if (!startStr) {
    document.getElementById('countdownTime').textContent = '—:—:—';
    return;
  }

  const start = new Date(startStr.replace('Z', '+00:00'));
  if (isNaN(start.getTime())) return;

  // Clear existing interval
  if (countdownInterval) clearInterval(countdownInterval);

  function tick() {
    const now = new Date();
    const elapsed = Math.max(0, Math.floor((now - start) / 1000));

    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;

    document.getElementById('countdownTime').textContent =
      `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

    // Session type for title
    const sessionName = (state.session?.name || '').toLowerCase();
    if (sessionName.includes('race') || sessionName.includes('sprint')) {
      document.getElementById('countdownTitle').textContent = 'Race Duration';
    } else {
      document.getElementById('countdownTitle').textContent = 'Session Time';
    }

    // 2-hour and 3-hour limits (for races)
    const limit2h = document.getElementById('limit2h');
    const limit3h = document.getElementById('limit3h');

    const twoH = 2 * 3600;
    const threeH = 3 * 3600;

    // 2h remaining
    const rem2h = twoH - elapsed;
    if (rem2h > 0) {
      const rm = Math.floor(rem2h / 60);
      const rs = rem2h % 60;
      limit2h.textContent = `2h: -${rm}:${String(rs).padStart(2, '0')}`;
      limit2h.className = 'countdown-limit' + (rem2h < 600 ? ' active' : '');
    } else {
      limit2h.textContent = '2h: EXCEEDED';
      limit2h.className = 'countdown-limit exceeded';
    }

    // 3h remaining
    const rem3h = threeH - elapsed;
    if (rem3h > 0) {
      const rm3 = Math.floor(rem3h / 60);
      const rs3 = rem3h % 60;
      limit3h.textContent = `3h: -${rm3}:${String(rs3).padStart(2, '0')}`;
      limit3h.className = 'countdown-limit' + (rem3h < 600 ? ' active' : '');
    } else {
      limit3h.textContent = '3h: EXCEEDED';
      limit3h.className = 'countdown-limit exceeded';
    }
  }

  tick();
  countdownInterval = setInterval(tick, 1000);
}

// ── Helpers ───────────────────────────────────
function hexToRgba(hex, alpha) {
  if (!hex) return `rgba(85,85,85,${alpha})`;
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  const r = parseInt(hex.substr(0, 2), 16);
  const g = parseInt(hex.substr(2, 2), 16);
  const b = parseInt(hex.substr(4, 2), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatType(type) {
  const map = {
    'FLAG': 'FLAG',
    'INVESTIGATION': 'INV',
    'PENALTY': 'PEN',
    'DRS': 'DRS',
    'TRACK_LIMITS': 'TL',
    'OTHER': 'RC',
  };
  return map[type] || 'RC';
}

function windDirArrow(dir) {
  if (!dir) return '';
  const d = parseInt(dir);
  if (isNaN(d)) return dir;
  const arrows = ['↑', '↗', '→', '↘', '↓', '↙', '←', '↖'];
  return arrows[Math.round(d / 45) % 8];
}

// ── Init ──────────────────────────────────────
connect();
</script>
</body>
</html>
