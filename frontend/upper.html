<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>F1 Dashboard — Track Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800;900&display=swap');

  :root {
    --bg: #0a0a0a;
    --panel: #0e0e0e;
    --border: #1a1a1a;
    --text: #dddddd;
    --text-dim: #555555;
    --f1-red: #ff1801;
    --flag-green: #00cc44;
    --flag-yellow: #ffcc00;
    --flag-red: #ff2222;
    --purple: #cc44ff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    cursor: none;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 260px;
    grid-template-rows: 8px auto 1fr auto;
    height: 100vh;
    background: var(--panel);
  }

  /* Flag Bar */
  .flag-bar {
    grid-column: 1 / -1;
    height: 8px;
    background: var(--flag-green);
    transition: background 0.5s, box-shadow 0.5s;
  }
  .flag-bar.yellow, .flag-bar.double_yellow { background: var(--flag-yellow); box-shadow: 0 2px 20px #ffcc0044; }
  .flag-bar.red { background: var(--flag-red); box-shadow: 0 2px 20px #ff222244; }
  .flag-bar.sc, .flag-bar.vsc { background: var(--flag-yellow); }
  .flag-bar.none { background: #333; }

  /* Info Bar */
  .info-bar {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 20px;
  }
  .info-left { display: flex; align-items: center; gap: 16px; }
  .info-right { display: flex; align-items: center; gap: 20px; }
  .f1-logo { color: var(--f1-red); font-weight: 900; font-size: 22px; }
  .circuit-name { color: #999; font-weight: 700; font-size: 20px; }
  .session-name { color: #555; font-size: 14px; }
  .flag-indicator { font-weight: 700; font-size: 14px; }
  .lap-counter { color: #999; font-weight: 700; font-size: 20px; }

  /* Track Map */
  .track-area {
    grid-column: 1;
    position: relative;
    overflow: hidden;
  }
  #trackCanvas { width: 100%; height: 100%; }

  /* Leaderboard Sidebar */
  .sidebar {
    grid-column: 2;
    grid-row: 3 / 5;
    border-left: 1px solid var(--border);
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }
  #leaderboard {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .sidebar::-webkit-scrollbar { width: 0; }
  .sidebar-header {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: var(--f1-red);
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, rgba(255,24,1,0.05), transparent);
    position: sticky;
    top: 0; z-index: 1;
    background-color: var(--panel);
  }
  .driver-row {
    display: grid;
    grid-template-columns: 42px 1fr;
    align-items: center;
    padding: 7px 14px;
    font-size: 22px;
    border-left: 5px solid transparent;
    position: relative;
  }
  .driver-row::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.08;
    border-radius: 0 3px 3px 0;
  }
  .driver-row .pos { font-weight: 500; color: #555; font-size: 20px; }
  .driver-row .pos.top3 { font-weight: 900; color: #fff; }
  .driver-row .pos.top10 { color: #aaa; }
  .driver-row .abbr { font-weight: 800; color: #ddd; font-size: 20px; }
  .driver-row .tire {
    width: 17px; height: 17px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }
  .driver-row .gap { text-align: right; font-size: 14px; color: #666; }
  .driver-row .gap.leader { color: var(--flag-green); font-weight: 800; }
  .driver-row .gap.dnf { color: #ff4444; }

  /* Bottom Bar */
  .bottom-bar {
    grid-column: 1 / -1;
    display: flex;
    gap: 28px;
    padding: 8px 24px;
    border-top: 1px solid var(--border);
    font-size: 14px;
    color: var(--text-dim);
  }
  .bottom-bar .value { color: #bbb; }
  .bottom-bar .fastest { color: var(--purple); }
  .bottom-bar .delay { color: #ffaa22; }

  /* Flag Popup */
  .flag-popup-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.82); backdrop-filter: blur(6px);
    align-items: center; justify-content: center;
  }
  .flag-popup-overlay.visible { display: flex; }
  .flag-popup {
    background: #111; border-radius: 10px;
    padding: 40px 64px; text-align: center; max-width: 70%;
  }
  .flag-popup .flag-band { width: 140px; height: 14px; border-radius: 7px; margin: 0 auto 22px; }
  .flag-popup .flag-title { font-size: 44px; font-weight: 900; letter-spacing: 0.08em; margin-bottom: 12px; }
  .flag-popup .flag-message { font-size: 24px; color: #ccc; font-weight: 600; margin-bottom: 14px; }
  .flag-popup .flag-sector { font-size: 20px; color: #999; margin-bottom: 10px; }
  .flag-popup .flag-driver {
    font-size: 22px; color: #fff; font-weight: 700;
    padding: 12px 28px; background: rgba(255,255,255,0.05);
    border-radius: 5px; display: inline-block; margin-top: 8px;
  }

  /* Standby */
  .standby {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: var(--bg); align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
  }
  .standby.visible { display: flex; }
  .standby h1 { font-size: 32px; font-weight: 300; }
  .standby h1 span { font-weight: 900; color: var(--f1-red); }
  .standby p { color: #444; font-size: 14px; }

  .tire-S { background: #FF3333; }
  .tire-M { background: #FFD700; }
  .tire-H { background: #FFFFFF; border: 1.5px solid #777; }
  .tire-I { background: #44BB44; }
  .tire-W { background: #3399FF; }
</style>
</head>
<body>

<div class="container">
  <div class="flag-bar" id="flagBar"></div>
  <div class="info-bar">
    <div class="info-left">
      <span class="f1-logo">F1</span>
      <span class="circuit-name" id="circuitName">—</span>
      <span class="session-name" id="sessionName"></span>
    </div>
    <div class="info-right">
      <span class="flag-indicator" id="flagIndicator">● —</span>
      <span class="lap-counter" id="lapCounter"></span>
    </div>
  </div>
  <div class="track-area">
    <canvas id="trackCanvas"></canvas>
  </div>
  <div class="sidebar">
    <div class="sidebar-header">POSITIONS</div>
    <div id="leaderboard"></div>
  </div>
  <div class="bottom-bar">
    <span>FASTEST: <span class="fastest" id="fastestLap">—</span></span>
    <span>SPEED TRAP: <span class="value" id="speedTrap">—</span></span>
    <span>DELAY: <span class="delay" id="delayValue">—</span></span>
  </div>
</div>

<div class="flag-popup-overlay" id="flagPopup">
  <div class="flag-popup">
    <div class="flag-band" id="popupBand"></div>
    <div class="flag-title" id="popupTitle">—</div>
    <div class="flag-message" id="popupMessage"></div>
    <div class="flag-sector" id="popupSector"></div>
    <div class="flag-driver" id="popupDriver"></div>
  </div>
</div>

<div class="standby" id="standby">
  <h1>F1 <span>LIVE</span> DASHBOARD</h1>
  <p id="standbyInfo">Waiting for session data...</p>
  <p style="color:#333;font-size:12px;margin-top:20px">System running — will activate automatically when session starts</p>
</div>

<script>
// ── WebSocket ──────────────────────────────────────────
class F1Socket {
  constructor(channel, onState) {
    this.channel = channel;
    this.onState = onState;
    this.reconnectDelay = 2000;
    this.connect();
  }
  connect() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    this.ws = new WebSocket(`${proto}//${location.host}/ws/${this.channel}`);
    this.ws.onopen = () => { this.reconnectDelay = 2000; };
    this.ws.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        if (d.type === "keepalive" || d.type === "pong") return;
        if (d.type === "refresh") { location.reload(); return; }
        this.onState(d);
      } catch(err) {}
    };
    this.ws.onclose = () => {
      setTimeout(() => this.connect(), this.reconnectDelay);
      this.reconnectDelay = Math.min(this.reconnectDelay * 1.5, 10000);
    };
    this.ws.onerror = () => {};
  }
}

// ── Constants ──────────────────────────────────────────
const FLAG_COLORS = {
  green: "#00cc44", yellow: "#ffcc00", double_yellow: "#ffcc00",
  red: "#ff2222", sc: "#ffcc00", vsc: "#ffcc00", chequered: "#ffffff", none: "#333"
};
const FLAG_LABELS = {
  green: "GREEN", yellow: "YELLOW", double_yellow: "DBL YELLOW",
  red: "RED FLAG", sc: "SAFETY CAR", vsc: "VSC", chequered: "CHEQUERED", none: "—"
};

// ── State ──────────────────────────────────────────────
let state = null;
let popupTimeout = null;
let trackData = null;

// ── Track Loading ──────────────────────────────────────
const TRACK_FILE_MAP = {
  "Melbourne": "melbourne", "Sakhir": "sakhir", "Shanghai": "shanghai",
  "Suzuka": "suzuka", "Spielberg": "spielberg", "Silverstone": "silverstone",
  "Spa-Francorchamps": "spa", "Monza": "monza", "Monte Carlo": "monaco",
  "Catalunya": "catalunya", "Hungaroring": "hungaroring", "Zandvoort": "zandvoort",
  "Baku": "baku", "Singapore": "singapore", "Austin": "austin",
  "Mexico City": "mexico", "Interlagos": "interlagos", "Las Vegas": "lasvegas",
  "Lusail": "lusail", "Yas Marina Circuit": "yas_marina", "Jeddah": "jeddah",
  "Miami": "miami", "Montreal": "montreal", "Madring": "madrid",
};

async function loadTrack(circuitShort) {
  const fileName = TRACK_FILE_MAP[circuitShort] || circuitShort.toLowerCase().replace(/\s+/g, '_');
  try {
    const resp = await fetch(`/tracks/${fileName}.json`);
    if (resp.ok) {
      trackData = await resp.json();
      console.log(`Track loaded: ${trackData.name} (${trackData.points.length} pts)`);
      return;
    }
  } catch (e) {}
  console.warn(`No track file for "${circuitShort}", using driver positions as fallback`);
  trackData = null;
}

// ── Canvas ─────────────────────────────────────────────
const canvas = document.getElementById("trackCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  const area = canvas.parentElement;
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// ── Coordinate Mapping ─────────────────────────────────
function getTrackTransform(w, h) {
  // Maps raw API x,y to canvas x,y
  // Auto-rotates so the longest dimension goes horizontally
  let minX, maxX, minY, maxY;

  if (trackData && trackData.raw_bounds) {
    const b = trackData.raw_bounds;
    minX = b.min_x; maxX = b.max_x;
    minY = b.min_y; maxY = b.max_y;
  } else {
    const active = (state?.drivers || []).filter(d => d.x !== 0 || d.y !== 0);
    if (active.length < 2) return null;
    const xs = active.map(d => d.x);
    const ys = active.map(d => d.y);
    minX = Math.min(...xs); maxX = Math.max(...xs);
    minY = Math.min(...ys); maxY = Math.max(...ys);
  }

  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 1;

  // Determine if track is taller than wide — if so, rotate 90°
  const shouldRotate = rangeY > rangeX * 1.15;

  const padding = 50;
  const drawW = w - padding * 2;
  const drawH = h - padding * 2;

  const midX = (minX + maxX) / 2;
  const midY = (minY + maxY) / 2;
  const cx = w / 2;
  const cy = h / 2;

  if (shouldRotate) {
    // Rotate 90° — swap X and Y, fit rotated dimensions
    const scale = Math.min(drawW / rangeY, drawH / rangeX);
    return (rawX, rawY) => [
      cx + (rawY - midY) * scale,
      cy + (rawX - midX) * scale
    ];
  } else {
    const scale = Math.min(drawW / rangeX, drawH / rangeY);
    return (rawX, rawY) => [
      cx + (rawX - midX) * scale,
      cy - (rawY - midY) * scale
    ];
  }
}

// ── Rendering ──────────────────────────────────────────
function render() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const transform = getTrackTransform(w, h);
  if (!transform) return;

  // 1) Draw track outline from JSON points
  if (trackData && trackData.points && trackData.points.length > 3) {
    const b = trackData.raw_bounds;
    const rng = Math.max(b.max_x - b.min_x, b.max_y - b.min_y) || 1;

    const canvasPts = trackData.points.map(([nx, ny]) => {
      const rawX = nx * rng + b.min_x;
      const rawY = ny * rng + b.min_y;
      return transform(rawX, rawY);
    });

    // Track surface
    ctx.beginPath();
    ctx.moveTo(canvasPts[0][0], canvasPts[0][1]);
    for (let i = 1; i < canvasPts.length; i++) {
      ctx.lineTo(canvasPts[i][0], canvasPts[i][1]);
    }
    

    // Outer edge
    ctx.strokeStyle = "#1a1a1a";
    ctx.lineWidth = 36;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.stroke();

    // Road surface
    ctx.strokeStyle = "#252525";
    ctx.lineWidth = 28;
    ctx.stroke();

    // Subtle dashed center
    ctx.setLineDash([2, 16]);
    ctx.strokeStyle = "#2a2a2a";
    ctx.lineWidth = 30;
    ctx.globalAlpha = 0.15;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  }

  // 2) Draw drivers at real x,y positions
  const drivers = (state?.drivers || []).filter(d =>
    (d.x !== 0 || d.y !== 0) && d.status !== "dnf"
  );

  for (const d of drivers) {
    const [cx, cy] = transform(d.x, d.y);
    if (cx < -30 || cx > w + 30 || cy < -30 || cy > h + 30) continue;

    // Dot
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI * 2);
    ctx.fillStyle = d.team_color || "#555";
    ctx.globalAlpha = 0.94;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Label
    ctx.font = "900 11px 'JetBrains Mono', monospace";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(0,0,0,0.9)";
    ctx.shadowBlur = 3;
    ctx.fillText(d.abbr, cx, cy + 1);
    ctx.shadowBlur = 0;
  }
}

// ── Flag Popup ─────────────────────────────────────────
function showFlagPopup(flag) {
  if (!flag || !flag.changed) return;
  const overlay = document.getElementById("flagPopup");
  const color = FLAG_COLORS[flag.current] || "#333";
  const isGreen = flag.current === "green";

  document.getElementById("popupBand").style.cssText = `background:${color};box-shadow:0 0 24px ${color}88`;
  document.getElementById("popupTitle").textContent = FLAG_LABELS[flag.current] || flag.current.toUpperCase();
  document.getElementById("popupTitle").style.color = color;
  overlay.querySelector(".flag-popup").style.border = `4px solid ${color}`;
  document.getElementById("popupMessage").textContent = isGreen ? "TRACK CLEAR" : (flag.message || "");
  document.getElementById("popupSector").textContent = flag.sector ? `SECTOR ${flag.sector}` : "";

  const driverEl = document.getElementById("popupDriver");
  if (flag.driver && !isGreen) {
    driverEl.textContent = flag.driver;
    driverEl.style.display = "inline-block";
  } else {
    driverEl.style.display = "none";
  }

  overlay.classList.add("visible");
  clearTimeout(popupTimeout);
  popupTimeout = setTimeout(() => overlay.classList.remove("visible"), isGreen ? 4000 : 10000);
}

document.getElementById("flagPopup").addEventListener("click", () => {
  document.getElementById("flagPopup").classList.remove("visible");
  clearTimeout(popupTimeout);
});

// ── Leaderboard ────────────────────────────────────────
function renderLeaderboard(drivers) {
  const el = document.getElementById("leaderboard");
  let html = "";
  for (const d of drivers) {
    const posClass = d.pos <= 3 ? "top3" : d.pos <= 10 ? "top10" : "";
    html += `<div class="driver-row" style="border-left-color:${d.team_color};--tc:${d.team_color}">
      <span class="pos ${posClass}">${d.pos || "—"}</span>
      <span class="abbr">${d.abbr}</span>
      <style>.driver-row[style*="${d.team_color}"]::before{background:${d.team_color}}</style>
    </div>`;
  }
  el.innerHTML = html;
}

// ── Main Update ────────────────────────────────────────
let lastCircuit = "";

async function updateUI(data) {
  state = data;

  // Show standby if no drivers or session inactive
  const hasDrivers = data.drivers && data.drivers.length > 0;
  const hasActiveDrivers = hasDrivers && data.drivers.some(d => d.x !== 0 || d.y !== 0);
  const sessionActive = data.session && data.session.status === "active";

  if (!hasDrivers) {
    document.getElementById("standby").classList.add("visible");
    document.getElementById("standbyInfo").textContent = "No session data available";
    return;
  }
  document.getElementById("standby").classList.remove("visible");

  // Load track on circuit change
  const circuit = data.session?.circuit || "";
  if (circuit && circuit !== lastCircuit) {
    lastCircuit = circuit;
    await loadTrack(circuit);
  }

  // Flag bar
  document.getElementById("flagBar").className = "flag-bar " + (data.flag?.current || "none");

  // Flag indicator
  const fi = document.getElementById("flagIndicator");
  fi.style.color = FLAG_COLORS[data.flag?.current] || "#333";
  fi.textContent = `● ${FLAG_LABELS[data.flag?.current] || "—"}`;

  // Session info
  document.getElementById("circuitName").textContent = circuit || "—";
  document.getElementById("sessionName").textContent = data.session?.name || "";
  const lap = data.session?.lap;
  const total = data.session?.total_laps;
  document.getElementById("lapCounter").textContent =
    (lap && total) ? `LAP ${lap} / ${total}` : (data.session?.name || "");

  // Bottom bar
  document.getElementById("fastestLap").textContent =
    data.fastest_lap?.driver ? `${data.fastest_lap.driver} ${data.fastest_lap.time}` : "—";
  document.getElementById("speedTrap").textContent =
    data.speed_trap?.driver ? `${data.speed_trap.driver} ${Math.round(data.speed_trap.speed)}` : "—";
  document.getElementById("delayValue").textContent = `${(data.delay_seconds || 0).toFixed(1)}s`;

  // Render everything
  renderLeaderboard(data.drivers || []);
  render();
  showFlagPopup(data.flag);
}

// ── Init ───────────────────────────────────────────────
document.getElementById("standby").classList.add("visible");
new F1Socket("upper", updateUI);
</script>
</body>
</html>
