<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>F1 Dashboard — Upper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --text: #e0e0e0;
    --dim: #666;
    --f1-red: #ff1801;
    --green: #00d647;
    --yellow: #ffd000;
    --double-yellow: #ff8c00;
    --red: #ff1801;
    --blue: #2196f3;
    --tire-soft: #ff1801;
    --tire-medium: #ffd000;
    --tire-hard: #cccccc;
    --tire-inter: #00c853;
    --tire-wet: #2196f3;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    position: relative;
  }

  /* ── Top Bar ─────────────────────────────── */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40px;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    z-index: 100;
  }

  .session-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .f1-logo { color: var(--f1-red); font-weight: 800; font-size: 18px; }
  .circuit-name { font-weight: 600; font-size: 16px; }
  .session-name { font-weight: 300; font-size: 14px; color: var(--dim); }
  .lap-counter { margin-left: auto; font-size: 14px; font-weight: 500; }

  /* ── Flag Bar ────────────────────────────── */
  .flag-bar {
    position: absolute;
    top: 40px; left: 0; right: 0;
    height: 4px;
    transition: all 0.3s ease;
    z-index: 99;
  }
  .flag-bar.green { background: var(--green); }
  .flag-bar.yellow { background: var(--yellow); }
  .flag-bar.double_yellow { background: var(--double-yellow); }
  .flag-bar.red { background: var(--red); box-shadow: 0 0 20px rgba(255,24,1,0.5); }
  .flag-bar.chequered { background: repeating-linear-gradient(90deg, #fff 0 10px, #000 10px 20px); }
  .flag-bar.none { background: var(--green); opacity: 0.3; }

  /* ── Flag Popup ──────────────────────────── */
  .flag-popup {
    display: none;
    position: absolute;
    top: 52px; left: 50%;
    transform: translateX(-50%);
    padding: 12px 32px;
    border-radius: 6px;
    font-size: 18px;
    font-weight: 700;
    z-index: 200;
    animation: popIn 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .flag-popup.show { display: block; }
  .flag-popup.yellow { background: var(--yellow); color: #000; }
  .flag-popup.double_yellow { background: var(--double-yellow); color: #000; }
  .flag-popup.red { background: var(--red); color: #fff; }
  .flag-popup.chequered { background: #fff; color: #000; }

  @keyframes popIn {
    from { transform: translateX(-50%) scale(0.8); opacity: 0; }
    to   { transform: translateX(-50%) scale(1); opacity: 1; }
  }

  /* ── Main Layout ─────────────────────────── */
  .main {
    position: absolute;
    top: 44px;
    left: 0; right: 0; bottom: 38px;
    display: flex;
  }

  /* ── Track Map Area ──────────────────────── */
  .track-area {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .track-map-container {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: 900px;
    max-height: 900px;
  }

  .track-map-container svg {
    width: 100%;
    height: 100%;
  }

  .driver-dot {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.8);
    transform: translate(-50%, -50%);
    transition: left 1s linear, top 1s linear;
    z-index: 10;
  }

  .driver-dot .dot-label {
    position: absolute;
    left: 18px;
    top: -3px;
    font-size: 10px;
    font-weight: 700;
    white-space: nowrap;
    text-shadow: 0 0 4px rgba(0,0,0,0.9);
  }

  .no-map-msg {
    color: var(--dim);
    font-size: 14px;
    text-align: center;
  }

  /* ── Leaderboard ─────────────────────────── */
  .leaderboard {
    width: 520px;
    min-width: 520px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    scrollbar-width: none;
  }
  .leaderboard::-webkit-scrollbar { display: none; }

  .lb-header {
    position: sticky;
    top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }

  .flag-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .flag-dot.green { background: var(--green); }
  .flag-dot.yellow { background: var(--yellow); }
  .flag-dot.double_yellow { background: var(--double-yellow); }
  .flag-dot.red { background: var(--red); }
  .flag-dot.none { background: var(--green); opacity: 0.3; }
  .flag-dot.chequered { background: #fff; }

  .lb-header-flag { font-size: 12px; font-weight: 600; text-transform: uppercase; }
  .lb-header-session { font-size: 12px; font-weight: 300; color: var(--dim); margin-left: auto; }

  .lb-col-header {
    display: grid;
    grid-template-columns: 34px 6px 50px 1fr 60px 38px 38px;
    padding: 3px 12px;
    font-size: 10px;
    font-weight: 600;
    color: var(--f1-red);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  /* ── Driver Row ──────────────────────────── */
  .driver-row {
    display: grid;
    grid-template-columns: 34px 6px 50px 1fr 60px 38px 38px;
    align-items: center;
    padding: 4px 12px;
    border-bottom: 1px solid #1a1a1a;
    font-size: 14px;
    transition: background 0.2s;
    min-height: 38px;
  }
  .driver-row:hover { background: #1a1a1a; }

  .pos {
    font-weight: 700;
    font-size: 15px;
    text-align: right;
    padding-right: 4px;
  }

  .team-stripe {
    width: 4px;
    height: 24px;
    border-radius: 2px;
    margin: 0 auto;
  }

  .abbr {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
  }

  .gap-interval {
    font-size: 12px;
    color: var(--dim);
    font-weight: 400;
    text-align: left;
    overflow: hidden;
    white-space: nowrap;
    padding-right: 4px;
  }

  .interval-val { color: #999; }
  .gap-val { color: #666; font-size: 11px; }

  /* ── Tire Badge ──────────────────────────── */
  .tire-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .tire-badge {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    border: 2.5px solid;
    position: relative;
  }
  .tire-badge.S { border-color: var(--tire-soft); color: var(--tire-soft); }
  .tire-badge.M { border-color: var(--tire-medium); color: var(--tire-medium); }
  .tire-badge.H { border-color: var(--tire-hard); color: var(--tire-hard); }
  .tire-badge.I { border-color: var(--tire-inter); color: var(--tire-inter); }
  .tire-badge.W { border-color: var(--tire-wet); color: var(--tire-wet); }

  .tire-laps {
    font-size: 10px;
    font-weight: 600;
    color: #888;
    min-width: 18px;
    text-align: center;
  }

  /* ── Track Limits Badge ──────────────────── */
  .tl-cell {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tl-badge {
    width: 24px;
    height: 20px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    background: transparent;
    color: var(--dim);
  }
  .tl-badge.warn { background: rgba(255,208,0,0.15); color: var(--yellow); }
  .tl-badge.crit { background: rgba(255,24,1,0.2); color: var(--f1-red); }

  /* ── Bottom Bar ──────────────────────────── */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 38px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 12px;
    gap: 24px;
    z-index: 100;
  }

  .stat-label { color: var(--dim); font-weight: 400; margin-right: 4px; }
  .stat-value { font-weight: 600; }
  .stat-value.purple { color: #a855f7; }
  .stat-value.speed { color: var(--green); }
  .stat-value.delay { color: var(--f1-red); }

  .bottom-spacer { flex: 1; }

  .connection-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
  }
  .connection-dot.off { background: var(--red); }

  /* ── Standby Screen ──────────────────────── */
  .standby {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 500;
    background: var(--bg);
  }
  .standby.hidden { display: none; }
  .standby h1 { font-size: 28px; font-weight: 300; }
  .standby h1 span { color: var(--f1-red); font-weight: 900; }
  .standby .sub { color: var(--dim); font-size: 14px; margin-top: 8px; }
  .standby .next-info { color: #888; font-size: 13px; margin-top: 20px; }
</style>
</head>
<body>

<!-- Standby -->
<div class="standby" id="standby">
  <h1>F1 <span>LIVE</span> DASHBOARD</h1>
  <div class="sub">Waiting for session…</div>
  <div class="next-info" id="standbyInfo"></div>
</div>

<!-- Top Bar -->
<div class="top-bar">
  <div class="session-info">
    <span class="f1-logo">F1</span>
    <span class="circuit-name" id="circuit">—</span>
    <span class="session-name" id="sessionName">—</span>
  </div>
  <span class="lap-counter" id="lapCounter"></span>
</div>

<div class="flag-bar none" id="flagBar"></div>
<div class="flag-popup" id="flagPopup"></div>

<!-- Main Content -->
<div class="main">
  <!-- Track Map -->
  <div class="track-area" id="trackArea">
    <div class="track-map-container" id="trackMapContainer">
      <div class="no-map-msg" id="noMapMsg">Loading track map…</div>
    </div>
  </div>

  <!-- Leaderboard -->
  <div class="leaderboard" id="leaderboard">
    <div class="lb-header">
      <div class="flag-dot none" id="flagDot"></div>
      <span class="lb-header-flag" id="flagLabel">—</span>
      <span class="lb-header-session" id="lbSession">—</span>
    </div>
    <div class="lb-col-header">
      <span style="text-align:right">POS</span>
      <span></span>
      <span>DRV</span>
      <span>INTERVAL</span>
      <span>TIRE</span>
      <span>PIT</span>
      <span>TL</span>
    </div>
    <div id="driverList"></div>
  </div>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar">
  <span><span class="stat-label">FASTEST:</span><span class="stat-value purple" id="fastestLap">—</span></span>
  <span><span class="stat-label">SPEED TRAP:</span><span class="stat-value speed" id="speedTrap">—</span></span>
  <span class="bottom-spacer"></span>
  <span><span class="stat-label">DELAY:</span><span class="stat-value delay" id="delayVal">0.0s</span></span>
  <div class="connection-dot" id="connDot"></div>
</div>

<script>
// ── State ─────────────────────────────────────
let state = null;
let ws = null;
let reconnectTimer = null;
let trackSvgEl = null;
let trackBounds = null;  // {xMin, xMax, yMin, yMax} from track SVG
let flagDismissTimer = null;
let lastFlagShown = '';

// ── WebSocket ─────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/upper`);

  ws.onopen = () => {
    document.getElementById('connDot').classList.remove('off');
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onclose = () => {
    document.getElementById('connDot').classList.add('off');
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'keepalive' || d.type === 'pong' || d.type === 'refresh') {
        if (d.type === 'refresh') location.reload();
        return;
      }
      state = d;
      render();
    } catch (err) { console.error('Parse error:', err); }
  };

  // Keepalive ping every 20s
  setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping');
  }, 20000);
}

// ── Track Map Loading ─────────────────────────
async function loadTrackMap(circuit) {
  if (!circuit) return;
  const slug = circuit.toLowerCase().replace(/[^a-z0-9]/g, '_');
  const container = document.getElementById('trackMapContainer');

  // Try multiple filename patterns
  const names = [slug, circuit.toLowerCase(), circuit];
  for (const name of names) {
    try {
      const resp = await fetch(`/tracks/${name}.svg`);
      if (resp.ok) {
        const svgText = await resp.text();
        container.innerHTML = svgText;
        trackSvgEl = container.querySelector('svg');
        if (trackSvgEl) {
          // Extract viewBox for coordinate mapping
          const vb = trackSvgEl.getAttribute('viewBox');
          if (vb) {
            const [x, y, w, h] = vb.split(/\s+/).map(Number);
            trackBounds = { xMin: x, yMin: y, xMax: x + w, yMax: y + h };
          }
        }
        return;
      }
    } catch (e) { /* try next */ }
  }

  container.innerHTML = '<div class="no-map-msg">Track map not available for ' + circuit + '</div>';
}

// ── Coordinate Mapping ────────────────────────
function mapCoordinates(x, y) {
  // OpenF1 location x,y are track coordinates
  // We need to find the range from actual driver data and map to percentage
  if (!state || !state.drivers) return null;

  // Collect all valid x,y from drivers
  const points = state.drivers.filter(d => d.x !== 0 || d.y !== 0);
  if (points.length < 2) return null;

  const xs = points.map(d => d.x);
  const ys = points.map(d => d.y);
  const xMin = Math.min(...xs) - 500;
  const xMax = Math.max(...xs) + 500;
  const yMin = Math.min(...ys) - 500;
  const yMax = Math.max(...ys) + 500;

  if (xMax === xMin || yMax === yMin) return null;

  // Map to 5-95% of container
  const pctX = 5 + ((x - xMin) / (xMax - xMin)) * 90;
  const pctY = 5 + ((y - yMin) / (yMax - yMin)) * 90;

  return { left: pctX, top: pctY };
}

// ── Rendering ─────────────────────────────────
let lastCircuit = '';

function render() {
  if (!state) return;

  const s = state.session || {};
  const isActive = s.status === 'active';

  // Standby
  const standby = document.getElementById('standby');
  if (!isActive && !s.session_key) {
    standby.classList.remove('hidden');
    const info = document.getElementById('standbyInfo');
    if (s.name && s.name !== 'Unknown') {
      info.textContent = `Last: ${s.name} at ${s.circuit || '—'} (${s.country || ''})`;
    }
    return;
  }
  standby.classList.add('hidden');

  // Session info
  document.getElementById('circuit').textContent = s.circuit || '—';
  document.getElementById('sessionName').textContent = s.name || '—';

  if (s.lap) {
    document.getElementById('lapCounter').textContent = `LAP ${s.lap}`;
  }

  // Load track map if circuit changed
  if (s.circuit && s.circuit !== lastCircuit) {
    lastCircuit = s.circuit;
    loadTrackMap(s.circuit);
  }

  // Flag
  renderFlag(state.flag);

  // Drivers
  renderDrivers(state.drivers || []);

  // Driver dots on map
  renderDriverDots(state.drivers || []);

  // Bottom bar
  const fl = state.fastest_lap;
  if (fl && fl.driver && fl.time) {
    document.getElementById('fastestLap').textContent = `${fl.driver} ${fl.time}`;
  }
  const st = state.speed_trap;
  if (st && st.driver && st.speed) {
    document.getElementById('speedTrap').textContent = `${st.driver} ${Math.round(st.speed)} km/h`;
  }
  document.getElementById('delayVal').textContent = `${(state.delay_seconds || 0).toFixed(1)}s`;

  // Leaderboard header
  const flagName = (state.flag?.current || 'NONE').toUpperCase().replace('_', ' ');
  document.getElementById('flagLabel').textContent = flagName;
  document.getElementById('lbSession').textContent = s.name || '';

  // Flag dot
  const dotEl = document.getElementById('flagDot');
  dotEl.className = 'flag-dot ' + (state.flag?.current || 'none').toLowerCase();
}

function renderFlag(flag) {
  if (!flag) return;

  const bar = document.getElementById('flagBar');
  const cls = (flag.current || 'none').toLowerCase();
  bar.className = 'flag-bar ' + cls;

  // Popup for flag changes
  if (flag.changed && flag.current !== 'NONE' && flag.current !== 'GREEN') {
    showFlagPopup(flag);
  }
}

function showFlagPopup(flag) {
  const popup = document.getElementById('flagPopup');
  const cls = (flag.current || '').toLowerCase();
  popup.className = 'flag-popup show ' + cls;

  let text = (flag.current || '').replace('_', ' ');
  if (flag.sector) text += ` — Sector ${flag.sector}`;
  if (flag.driver) text += ` — ${flag.driver}`;
  popup.textContent = text;

  if (flagDismissTimer) clearTimeout(flagDismissTimer);
  flagDismissTimer = setTimeout(() => {
    popup.classList.remove('show');
  }, 10000);
}

function renderDrivers(drivers) {
  const container = document.getElementById('driverList');
  let html = '';

  for (const d of drivers) {
    const tireClass = d.tire || '?';
    const tireLaps = d.tire_laps || d.stints?.[d.stints.length - 1]?.laps || '';

    // Track limits styling
    let tlClass = '';
    const tl = d.track_limits || 0;
    if (tl >= 3) tlClass = 'crit';
    else if (tl >= 2) tlClass = 'warn';

    // Interval display
    let intervalStr = '';
    if (d.pos === 1 || (!d.interval && !d.gap)) {
      intervalStr = '<span class="interval-val">LEADER</span>';
    } else if (d.interval) {
      intervalStr = `<span class="interval-val">+${d.interval}</span>`;
      if (d.gap) intervalStr += ` <span class="gap-val">(+${d.gap})</span>`;
    } else if (d.gap) {
      intervalStr = `<span class="gap-val">+${d.gap}</span>`;
    }

    // Last lap time
    if (d.last_lap && !d.interval && !d.gap) {
      intervalStr = `<span class="interval-val">${d.last_lap}</span>`;
    }

    html += `
      <div class="driver-row">
        <span class="pos">${d.pos || '—'}</span>
        <div class="team-stripe" style="background:${d.team_color || '#555'}"></div>
        <span class="abbr">${d.abbr || '???'}</span>
        <div class="gap-interval">${intervalStr}</div>
        <div class="tire-cell">
          <div class="tire-badge ${tireClass}">${tireClass}</div>
          <span class="tire-laps">${tireLaps || ''}</span>
        </div>
        <div class="tl-cell">
          <span style="font-size:12px;color:var(--dim)">${d.pit_stops || 0}</span>
        </div>
        <div class="tl-cell">
          <span class="tl-badge ${tlClass}">${tl > 0 ? tl : ''}</span>
        </div>
      </div>`;
  }

  container.innerHTML = html;
}

function renderDriverDots(drivers) {
  const container = document.getElementById('trackMapContainer');

  // Remove old dots
  container.querySelectorAll('.driver-dot').forEach(el => el.remove());

  // Only show dots if we have location data
  const withCoords = drivers.filter(d => d.x !== 0 || d.y !== 0);
  if (withCoords.length === 0) return;

  for (const d of withCoords) {
    const pos = mapCoordinates(d.x, d.y);
    if (!pos) continue;

    const dot = document.createElement('div');
    dot.className = 'driver-dot';
    dot.style.background = d.team_color || '#555';
    dot.style.left = pos.left + '%';
    dot.style.top = pos.top + '%';
    dot.innerHTML = `<span class="dot-label" style="color:${d.team_color || '#fff'}">${d.abbr || ''}</span>`;
    container.appendChild(dot);
  }
}

// ── Init ──────────────────────────────────────
connect();
</script>
</body>
</html>
