<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>F1 Dashboard — Track Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800;900&display=swap');

  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --border: #1e1e1e;
    --text: #dddddd;
    --text-dim: #666666;
    --f1-red: #ff1801;
    --flag-green: #00cc44;
    --flag-yellow: #ffcc00;
    --flag-red: #ff2222;
    --purple: #cc44ff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    cursor: none;
  }

  /* ── Layout ────────────────────────────── */
  .container {
    display: grid;
    grid-template-columns: 1fr 240px;
    grid-template-rows: 8px auto 1fr auto;
    height: 100vh;
    background: var(--panel);
  }

  /* ── Flag Bar ──────────────────────────── */
  .flag-bar {
    grid-column: 1 / -1;
    height: 8px;
    background: var(--flag-green);
    transition: background 0.5s, box-shadow 0.5s;
  }
  .flag-bar.yellow { background: var(--flag-yellow); box-shadow: 0 2px 20px #ffcc0044; }
  .flag-bar.red { background: var(--flag-red); box-shadow: 0 2px 20px #ff222244; }
  .flag-bar.sc, .flag-bar.vsc { background: var(--flag-yellow); }

  /* ── Info Bar ──────────────────────────── */
  .info-bar {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .info-left { display: flex; align-items: center; gap: 14px; }
  .info-right { display: flex; align-items: center; gap: 18px; }
  .f1-logo { color: var(--f1-red); font-weight: 900; font-size: 18px; }
  .circuit-name { color: #888; font-weight: 600; }
  .flag-indicator { font-weight: 700; font-size: 13px; }
  .lap-counter { color: #888; font-weight: 600; font-size: 14px; }

  /* ── Track Map ─────────────────────────── */
  .track-area {
    grid-column: 1;
    position: relative;
    overflow: hidden;
  }
  #trackCanvas {
    width: 100%;
    height: 100%;
  }

  /* ── Leaderboard Sidebar ───────────────── */
  .sidebar {
    grid-column: 2;
    grid-row: 3;
    border-left: 1px solid var(--border);
    overflow-y: auto;
    overflow-x: hidden;
  }
  .sidebar-header {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: var(--f1-red);
    border-bottom: 1px solid #1a1a1a;
    background: linear-gradient(90deg, rgba(255,24,1,0.04), transparent);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .driver-row {
    display: grid;
    grid-template-columns: 32px 52px 22px 1fr;
    align-items: center;
    padding: 3px 12px;
    font-size: 15px;
    border-left: 4px solid transparent;
  }
  .driver-row .pos { font-weight: 500; color: #666; }
  .driver-row .pos.top3 { font-weight: 900; color: #fff; }
  .driver-row .abbr { font-weight: 800; color: #ddd; }
  .driver-row .tire {
    width: 16px; height: 16px; border-radius: 50%;
    display: inline-block;
  }
  .driver-row .gap {
    text-align: right; font-size: 13px; color: #777;
  }
  .driver-row .gap.leader { color: var(--flag-green); font-weight: 800; }
  .driver-row .gap.dnf { color: #ff4444; }

  /* ── Bottom Bar ────────────────────────── */
  .bottom-bar {
    grid-column: 1 / -1;
    display: flex;
    gap: 24px;
    padding: 6px 20px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-dim);
  }
  .bottom-bar .value { color: #ccc; }
  .bottom-bar .fastest { color: var(--purple); }
  .bottom-bar .delay { color: #ffaa22; }

  /* ── Flag Popup ────────────────────────── */
  .flag-popup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
  }
  .flag-popup-overlay.visible { display: flex; }
  .flag-popup {
    background: #111;
    border-radius: 10px;
    padding: 36px 56px;
    text-align: center;
    max-width: 70%;
  }
  .flag-popup .flag-band {
    width: 140px; height: 14px; border-radius: 7px;
    margin: 0 auto 20px;
  }
  .flag-popup .flag-title {
    font-size: 40px; font-weight: 900;
    letter-spacing: 0.08em; margin-bottom: 10px;
  }
  .flag-popup .flag-message {
    font-size: 22px; color: #ccc; font-weight: 600; margin-bottom: 12px;
  }
  .flag-popup .flag-sector {
    font-size: 18px; color: #999; margin-bottom: 8px;
  }
  .flag-popup .flag-driver {
    font-size: 20px; color: #fff; font-weight: 700;
    padding: 10px 24px; background: rgba(255,255,255,0.05);
    border-radius: 5px; display: inline-block; margin-top: 6px;
  }

  /* ── Standby Screen ────────────────────── */
  .standby {
    display: none;
    position: fixed; inset: 0; z-index: 500;
    background: var(--bg);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  .standby.visible { display: flex; }
  .standby h1 { font-size: 28px; font-weight: 300; }
  .standby h1 span { font-weight: 900; color: var(--f1-red); }
  .standby p { color: #444; font-size: 14px; }

  /* Tire colors */
  .tire-S { background: #FF3333; }
  .tire-M { background: #FFD700; }
  .tire-H { background: #FFFFFF; border: 1.5px solid #777; }
  .tire-I { background: #44BB44; }
  .tire-W { background: #3399FF; }
</style>
</head>
<body>

<div class="container">
  <div class="flag-bar" id="flagBar"></div>

  <div class="info-bar">
    <div class="info-left">
      <span class="f1-logo">F1</span>
      <span class="circuit-name" id="circuitName">—</span>
    </div>
    <div class="info-right">
      <span class="flag-indicator" id="flagIndicator">● —</span>
      <span class="lap-counter" id="lapCounter">LAP — / —</span>
    </div>
  </div>

  <div class="track-area">
    <canvas id="trackCanvas"></canvas>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">POSITIONS</div>
    <div id="leaderboard"></div>
  </div>

  <div class="bottom-bar">
    <span>FASTEST: <span class="fastest" id="fastestLap">—</span></span>
    <span>SPEED TRAP: <span class="value" id="speedTrap">—</span></span>
    <span>DELAY: <span class="delay" id="delayValue">—</span></span>
  </div>
</div>

<!-- Flag Popup -->
<div class="flag-popup-overlay" id="flagPopup">
  <div class="flag-popup">
    <div class="flag-band" id="popupBand"></div>
    <div class="flag-title" id="popupTitle">—</div>
    <div class="flag-message" id="popupMessage"></div>
    <div class="flag-sector" id="popupSector"></div>
    <div class="flag-driver" id="popupDriver"></div>
  </div>
</div>

<!-- Standby -->
<div class="standby" id="standby">
  <h1>F1 <span>LIVE</span> DASHBOARD</h1>
  <p>Waiting for session data...</p>
</div>

<script>
// ── WebSocket ──────────────────────────────────────────
class F1Socket {
  constructor(channel, onState) {
    this.channel = channel;
    this.onState = onState;
    this.reconnectDelay = 2000;
    this.connect();
  }
  connect() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    this.ws = new WebSocket(`${proto}//${location.host}/ws/${this.channel}`);
    this.ws.onopen = () => { this.reconnectDelay = 2000; };
    this.ws.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        if (d.type === "keepalive" || d.type === "pong") return;
        if (d.type === "refresh") { location.reload(); return; }
        this.onState(d);
      } catch(err) {}
    };
    this.ws.onclose = () => {
      setTimeout(() => this.connect(), this.reconnectDelay);
      this.reconnectDelay = Math.min(this.reconnectDelay * 1.5, 10000);
    };
    this.ws.onerror = () => {};
  }
}

// ── State ──────────────────────────────────────────────
let state = null;
let popupTimeout = null;

const FLAG_COLORS = {
  green: "#00cc44", yellow: "#ffcc00", double_yellow: "#ffcc00",
  red: "#ff2222", sc: "#ffcc00", vsc: "#ffcc00", chequered: "#ffffff",
  none: "#333333"
};

const FLAG_LABELS = {
  green: "GREEN", yellow: "YELLOW", double_yellow: "DOUBLE YELLOW",
  red: "RED FLAG", sc: "SAFETY CAR", vsc: "VSC", chequered: "CHEQUERED",
  none: "—"
};

// ── Flag Popup ─────────────────────────────────────────
function showFlagPopup(flag) {
  if (!flag || !flag.changed) return;
  if (flag.current === "green" || flag.current === "none") {
    // Brief green flash
    const overlay = document.getElementById("flagPopup");
    const band = document.getElementById("popupBand");
    const title = document.getElementById("popupTitle");
    const msg = document.getElementById("popupMessage");
    const sector = document.getElementById("popupSector");
    const driver = document.getElementById("popupDriver");

    const color = FLAG_COLORS[flag.current] || "#333";
    band.style.background = color;
    band.style.boxShadow = `0 0 20px ${color}88`;
    title.textContent = FLAG_LABELS[flag.current] || flag.current.toUpperCase();
    title.style.color = color;
    overlay.querySelector(".flag-popup").style.borderColor = color;
    overlay.querySelector(".flag-popup").style.border = `4px solid ${color}`;
    msg.textContent = "TRACK CLEAR";
    sector.textContent = "";
    driver.textContent = "";
    driver.style.display = "none";

    overlay.classList.add("visible");
    clearTimeout(popupTimeout);
    popupTimeout = setTimeout(() => overlay.classList.remove("visible"), 4000);
    return;
  }

  const overlay = document.getElementById("flagPopup");
  const band = document.getElementById("popupBand");
  const title = document.getElementById("popupTitle");
  const msg = document.getElementById("popupMessage");
  const sector = document.getElementById("popupSector");
  const driver = document.getElementById("popupDriver");

  const color = FLAG_COLORS[flag.current] || "#ffcc00";
  band.style.background = color;
  band.style.boxShadow = `0 0 24px ${color}88`;
  title.textContent = FLAG_LABELS[flag.current] || flag.current.toUpperCase();
  title.style.color = color;
  overlay.querySelector(".flag-popup").style.border = `4px solid ${color}`;
  msg.textContent = flag.message || "";
  sector.textContent = flag.sector ? `SECTOR ${flag.sector}` : "";
  if (flag.driver) {
    driver.textContent = flag.driver;
    driver.style.display = "inline-block";
  } else {
    driver.style.display = "none";
  }

  overlay.classList.add("visible");
  clearTimeout(popupTimeout);
  popupTimeout = setTimeout(() => overlay.classList.remove("visible"), 10000);
}

// Dismiss popup on click
document.getElementById("flagPopup").addEventListener("click", () => {
  document.getElementById("flagPopup").classList.remove("visible");
  clearTimeout(popupTimeout);
});

// ── Leaderboard ────────────────────────────────────────
function renderLeaderboard(drivers) {
  const el = document.getElementById("leaderboard");
  let html = "";
  for (const d of drivers) {
    const isTop3 = d.pos <= 3;
    const gapClass = d.gap === "LEADER" ? "leader" : (d.status === "dnf" || d.gap === "DNF") ? "dnf" : "";
    const gapText = d.gap === "LEADER" ? "LDR" : d.gap || "";

    html += `<div class="driver-row" style="border-left-color:${d.team_color}">
      <span class="pos ${isTop3 ? 'top3' : ''}">${d.pos}</span>
      <span class="abbr">${d.abbr}</span>
      <span class="tire tire-${d.tire}"></span>
      <span class="gap ${gapClass}">${gapText}</span>
    </div>`;
  }
  el.innerHTML = html;
}

// ── Track Map (Canvas) ─────────────────────────────────
const canvas = document.getElementById("trackCanvas");
const ctx = canvas.getContext("2d");

// Default track shape (oval approximation — will be replaced with real track data)
function getDefaultTrackPoints(w, h) {
  const cx = w * 0.45, cy = h * 0.5;
  const rx = w * 0.32, ry = h * 0.38;
  const pts = [];
  for (let i = 0; i < 100; i++) {
    const a = (i / 100) * Math.PI * 2;
    // Distort oval for more interesting shape
    const mod = 1 + 0.15 * Math.sin(a * 3) + 0.08 * Math.cos(a * 5);
    pts.push([
      cx + rx * Math.cos(a) * mod,
      cy + ry * Math.sin(a) * mod,
    ]);
  }
  return pts;
}

let trackPoints = [];

function resizeCanvas() {
  const area = canvas.parentElement;
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
  trackPoints = getDefaultTrackPoints(canvas.width, canvas.height);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function getTrackPosition(pct) {
  if (!trackPoints.length) return [0, 0];
  const idx = ((pct % 1) + 1) % 1 * (trackPoints.length - 1);
  const lo = Math.floor(idx);
  const hi = Math.min(lo + 1, trackPoints.length - 1);
  const t = idx - lo;
  return [
    trackPoints[lo][0] + (trackPoints[hi][0] - trackPoints[lo][0]) * t,
    trackPoints[lo][1] + (trackPoints[hi][1] - trackPoints[lo][1]) * t,
  ];
}

function renderTrackMap(drivers) {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  if (!trackPoints.length) return;

  // Draw track surface
  ctx.beginPath();
  ctx.moveTo(trackPoints[0][0], trackPoints[0][1]);
  for (let i = 1; i < trackPoints.length; i++) {
    ctx.lineTo(trackPoints[i][0], trackPoints[i][1]);
  }
  ctx.closePath();
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 48;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.stroke();

  ctx.strokeStyle = "#444";
  ctx.lineWidth = 40;
  ctx.stroke();

  // Draw dashed center line
  ctx.setLineDash([2, 12]);
  ctx.strokeStyle = "#555";
  ctx.lineWidth = 42;
  ctx.globalAlpha = 0.15;
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  // Draw sector labels
  ctx.font = "bold 14px 'JetBrains Mono', monospace";
  ctx.fillStyle = "#444";
  const s1 = getTrackPosition(0.15);
  const s2 = getTrackPosition(0.48);
  const s3 = getTrackPosition(0.78);
  ctx.fillText("S1", s1[0] + 30, s1[1] - 30);
  ctx.fillText("S2", s2[0] + 30, s2[1] + 30);
  ctx.fillText("S3", s3[0] - 50, s3[1] - 30);

  // Draw drivers
  const active = (drivers || []).filter(d => d.track_pct >= 0 && d.status !== "dnf");
  for (const d of active) {
    const [x, y] = getTrackPosition(d.track_pct);

    // Dot
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI * 2);
    ctx.fillStyle = d.team_color || "#555";
    ctx.globalAlpha = 0.93;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Label
    ctx.font = "900 11px 'JetBrains Mono', monospace";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(0,0,0,0.9)";
    ctx.shadowBlur = 3;
    ctx.fillText(d.abbr, x, y + 1);
    ctx.shadowBlur = 0;
  }
}

// ── Main Update ────────────────────────────────────────
function updateUI(data) {
  state = data;

  // Hide standby
  document.getElementById("standby").classList.remove("visible");

  // Flag bar
  const flagBar = document.getElementById("flagBar");
  flagBar.className = "flag-bar " + (data.flag?.current || "green");

  // Flag indicator
  const fi = document.getElementById("flagIndicator");
  const flagColor = FLAG_COLORS[data.flag?.current] || "#333";
  fi.style.color = flagColor;
  fi.textContent = `● ${FLAG_LABELS[data.flag?.current] || "—"}`;

  // Session info
  document.getElementById("circuitName").textContent =
    data.session?.circuit || data.session?.country || "—";
  document.getElementById("lapCounter").textContent =
    `LAP ${data.session?.lap || "—"} / ${data.session?.total_laps || "—"}`;

  // Bottom bar
  document.getElementById("fastestLap").textContent =
    data.fastest_lap?.driver ? `${data.fastest_lap.driver} ${data.fastest_lap.time}` : "—";
  document.getElementById("speedTrap").textContent =
    data.speed_trap?.driver ? `${data.speed_trap.driver} ${Math.round(data.speed_trap.speed)}` : "—";
  document.getElementById("delayValue").textContent =
    `${(data.delay_seconds || 0).toFixed(1)}s`;

  // Leaderboard
  renderLeaderboard(data.drivers || []);

  // Track map
  renderTrackMap(data.drivers || []);

  // Flag popup
  showFlagPopup(data.flag);
}

// ── Standby ────────────────────────────────────────────
document.getElementById("standby").classList.add("visible");

// ── Connect ────────────────────────────────────────────
new F1Socket("upper", updateUI);

// ── Animation Loop ─────────────────────────────────────
function animate() {
  if (state) renderTrackMap(state.drivers || []);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
