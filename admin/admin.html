<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Dashboard — Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #eee;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    padding: 20px; max-width: 700px; margin: 0 auto;
  }
  h1 { font-size: 20px; font-weight: 300; margin-bottom: 4px; }
  h1 span { font-weight: 900; color: #ff1801; }
  .subtitle { color: #444; font-size: 12px; margin-bottom: 24px; }

  .card {
    background: #141414; border: 1px solid #222; border-radius: 6px;
    padding: 16px; margin-bottom: 14px;
  }
  .card-title { color: #666; font-size: 11px; letter-spacing: 0.08em; margin-bottom: 12px; }

  /* Status grid */
  .status-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .status-item { background: #1a1a1a; border-radius: 5px; padding: 10px 14px; }
  .status-label { color: #555; font-size: 10px; letter-spacing: 0.08em; }
  .status-value { font-size: 14px; font-weight: 700; margin-top: 6px; }
  .status-value.ok { color: #00cc44; }
  .status-value.warn { color: #ffaa22; }
  .status-value.err { color: #ff4444; }

  /* Delay slider */
  .delay-display {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .delay-value { color: #ffaa22; font-size: 22px; font-weight: 900; }
  input[type="range"] {
    width: 100%; height: 8px; accent-color: #ff1801;
    cursor: pointer; margin-bottom: 6px;
  }
  .delay-labels { display: flex; justify-content: space-between; color: #333; font-size: 10px; }

  /* Buttons */
  .btn-grid { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    flex: 1; min-width: 120px; padding: 10px 14px;
    background: #1e1e1e; border: 1px solid #333; border-radius: 5px;
    color: #888; font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: all 0.2s;
  }
  .btn:hover { color: #fff; border-color: #ff1801; }
  .btn:active { background: #ff180122; }
  .btn.danger { border-color: #ff444444; }
  .btn.danger:hover { border-color: #ff4444; color: #ff4444; }

  /* Log viewer */
  .log-area {
    background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 4px;
    padding: 10px; font-size: 11px; color: #555; max-height: 200px;
    overflow-y: auto; line-height: 1.6; white-space: pre-wrap;
  }

  .connection-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 6px;
  }
</style>
</head>
<body>

<h1>F1 <span>LIVE</span> DASHBOARD</h1>
<div class="subtitle">ADMIN PANEL</div>

<!-- Status -->
<div class="card">
  <div class="card-title">STATUS</div>
  <div class="status-grid">
    <div class="status-item">
      <div class="status-label">API</div>
      <div class="status-value" id="apiStatus">—</div>
    </div>
    <div class="status-item">
      <div class="status-label">CIRCUIT</div>
      <div class="status-value" id="circuitName" style="color:#eee">—</div>
    </div>
    <div class="status-item">
      <div class="status-label">SESSION</div>
      <div class="status-value" id="sessionName" style="color:#eee">—</div>
    </div>
    <div class="status-item">
      <div class="status-label">DRIVERS</div>
      <div class="status-value" id="driverCount">—</div>
    </div>
    <div class="status-item">
      <div class="status-label">DISPLAYS</div>
      <div class="status-value" id="displayStatus">—</div>
    </div>
    <div class="status-item">
      <div class="status-label">FLAG</div>
      <div class="status-value" id="flagStatus">—</div>
    </div>
    <div class="status-item">
      <div class="status-label">UPTIME</div>
      <div class="status-value" id="uptime">—</div>
    </div>
    <div class="status-item">
      <div class="status-label">LAP</div>
      <div class="status-value" id="lapStatus" style="color:#eee">—</div>
    </div>
  </div>
</div>

<!-- Delay -->
<div class="card">
  <div class="card-title">TV SYNC DELAY</div>
  <div class="delay-display">
    <span style="color:#888; font-size:12px;">Delay</span>
    <span class="delay-value" id="delayDisplay">8.0s</span>
  </div>
  <input type="range" id="delaySlider" min="0" max="30" step="0.5" value="8">
  <div class="delay-labels">
    <span>0s (live)</span>
    <span>30s (delayed)</span>
  </div>
</div>

<!-- Actions -->
<div class="card">
  <div class="card-title">ACTIONS</div>
  <div class="btn-grid">
    <button class="btn" onclick="refreshBrowsers()">Refresh Displays</button>
    <button class="btn" onclick="restartBackend()">Restart Backend</button>
    <button class="btn danger" onclick="forceReload()">Force Full Reload</button>
  </div>
</div>

<!-- Log -->
<div class="card">
  <div class="card-title">ACTIVITY LOG</div>
  <div class="log-area" id="logArea">Connecting...</div>
</div>

<script>
const delaySlider = document.getElementById("delaySlider");
const delayDisplay = document.getElementById("delayDisplay");
const logArea = document.getElementById("logArea");

let logLines = [];

function log(msg) {
  const ts = new Date().toLocaleTimeString();
  logLines.push(`[${ts}] ${msg}`);
  if (logLines.length > 100) logLines.shift();
  logArea.textContent = logLines.join("\n");
  logArea.scrollTop = logArea.scrollHeight;
}

// ── Delay Slider ───────────────────────────────────────
let delayTimeout = null;
delaySlider.addEventListener("input", () => {
  const val = parseFloat(delaySlider.value);
  delayDisplay.textContent = val.toFixed(1) + "s";

  clearTimeout(delayTimeout);
  delayTimeout = setTimeout(async () => {
    try {
      const resp = await fetch("/api/config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ delay_seconds: val }),
      });
      if (resp.ok) log(`Delay updated to ${val.toFixed(1)}s`);
      else log(`Delay update failed: ${resp.status}`);
    } catch (e) {
      log(`Delay update error: ${e.message}`);
    }
  }, 300);
});

// ── Actions ────────────────────────────────────────────
async function refreshBrowsers() {
  log("Refreshing displays...");
  try {
    await fetch("/api/refresh-browsers", { method: "POST" });
    log("Refresh command sent");
  } catch (e) { log(`Error: ${e.message}`); }
}

async function restartBackend() {
  log("⚠ Backend restart not available via API — use SSH:");
  log("  sudo systemctl restart f1-backend");
}

function forceReload() {
  log("Force reloading all displays...");
  refreshBrowsers();
  setTimeout(() => location.reload(), 1000);
}

// ── Health Polling ─────────────────────────────────────
async function pollHealth() {
  try {
    const resp = await fetch("/api/health");
    const h = await resp.json();

    // API status
    document.getElementById("apiStatus").textContent =
      h.api_connected ? "● CONNECTED" : "● DISCONNECTED";
    document.getElementById("apiStatus").className =
      "status-value " + (h.api_connected ? "ok" : "err");

    // Displays
    document.getElementById("displayStatus").textContent =
      `${h.displays_connected} connected`;
    document.getElementById("displayStatus").className =
      "status-value " + (h.displays_connected > 0 ? "ok" : "warn");

    // Drivers
    document.getElementById("driverCount").textContent =
      h.driver_count ? `${h.driver_count} loaded` : "0";
    document.getElementById("driverCount").className =
      "status-value " + (h.driver_count > 0 ? "ok" : "warn");

    // Uptime
    const mins = Math.floor(h.uptime_seconds / 60);
    const hrs = Math.floor(mins / 60);
    document.getElementById("uptime").textContent =
      hrs > 0 ? `${hrs}h ${mins % 60}m` : `${mins}m`;
    document.getElementById("uptime").className = "status-value";

  } catch (e) {
    document.getElementById("apiStatus").textContent = "● OFFLINE";
    document.getElementById("apiStatus").className = "status-value err";
  }

  // Fetch full state for session details
  try {
    const resp2 = await fetch("/api/state");
    const s = await resp2.json();

    // Circuit
    const circuit = s.session?.circuit || s.session?.circuit_short || "—";
    const country = s.session?.country || "";
    document.getElementById("circuitName").textContent = circuit;
    document.getElementById("circuitName").title = country;

    // Session name
    document.getElementById("sessionName").textContent =
      s.session?.name || "No Session";

    // Flag
    const flagMap = {
      green: "🟢 GREEN", yellow: "🟡 YELLOW", double_yellow: "🟡 DBL YELLOW",
      red: "🔴 RED FLAG", sc: "🟡 SAFETY CAR", vsc: "🟡 VSC",
      chequered: "🏁 CHEQUERED", none: "⚫ NONE"
    };
    const flagColors = {
      green: "ok", yellow: "warn", double_yellow: "warn",
      red: "err", sc: "warn", vsc: "warn", none: ""
    };
    const flag = s.flag?.current || "none";
    document.getElementById("flagStatus").textContent = flagMap[flag] || flag;
    document.getElementById("flagStatus").className =
      "status-value " + (flagColors[flag] || "");

    // Lap
    const lap = s.session?.lap;
    const total = s.session?.total_laps;
    if (lap && total) {
      document.getElementById("lapStatus").textContent = `${lap} / ${total}`;
    } else {
      document.getElementById("lapStatus").textContent = s.session?.name || "—";
    }

  } catch (e) {}
}

// ── WebSocket for live state ───────────────────────────
function connectWS() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${proto}//${location.host}/ws/admin`);
  ws.onopen = () => log("WebSocket connected to admin channel");
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === "keepalive") return;
      if (data.delay_seconds !== undefined) {
        delaySlider.value = data.delay_seconds;
        delayDisplay.textContent = data.delay_seconds.toFixed(1) + "s";
      }
    } catch(err) {}
  };
  ws.onclose = () => {
    log("WebSocket disconnected, reconnecting...");
    setTimeout(connectWS, 3000);
  };
}

// ── Init ───────────────────────────────────────────────
log("Admin panel loaded");
pollHealth();
setInterval(pollHealth, 5000);
connectWS();
</script>
</body>
</html>
